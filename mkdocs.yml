site_name: NeetCode 150 + Grind 169 — Complete Interview Handbook
site_description: ~197 unique problems covering NeetCode 150, Grind 169, Grind 75, and Blind 75. Every problem has intuition, optimal solution, and interview traps.
site_url: https://YOUR_USERNAME.github.io/interview-handbook/
repo_url: https://github.com/YOUR_USERNAME/interview-handbook
repo_name: interview-handbook
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  palette:
    scheme: slate
    primary: black
    accent: deep purple
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/YOUR_USERNAME

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - pymdownx.details
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - "Part 1 — NeetCode 150":
    - 1. Arrays & Hashing: 01_arrays_hashing.md
    - 2. Two Pointers: 02_two_pointers.md
    - 3. Sliding Window: 03_sliding_window.md
    - 4. Stack: 04_stack.md
    - 5. Binary Search: 05_binary_search.md
    - 6. Linked List: 06_linked_list.md
    - 7. Trees: 07_trees.md
    - 8. Tries: 08_tries.md
    - 9. Heap / Priority Queue: 09_heap.md
    - 10. Backtracking: 10_backtracking.md
    - 11. Graphs: 11_graphs.md
    - 12. Advanced Graphs: 12_advanced_graphs.md
    - 13. 1-D Dynamic Programming: 13_dp_1d.md
    - 14. 2-D Dynamic Programming: 14_dp_2d.md
    - 15. Greedy: 15_greedy.md
    - 16. Intervals: 16_intervals.md
    - 17. Math & Geometry: 17_math_geometry.md
    - 18. Bit Manipulation: 18_bit_manipulation.md
  - "Part 2 — Grind 169 Extra":
    - 19. Arrays Extra: 19_arrays_extra.md
    - 20. Linked List Extra: 20_linked_list_extra.md
    - 21. Trees Extra: 21_trees_extra.md
    - 22. Stack Extra: 22_stack_extra.md
    - 23. Strings Extra: 23_strings_extra.md
    - 24. Graphs Extra: 24_graphs_extra.md
    - 25. Hash Table & Heap Extra: 25_hash_heap_extra.md
    - 26. Math & DP Extra: 26_math_dp_extra.md
