site_name: NeetCode 150 + Grind 169 — Complete Interview Handbook
site_description: ~197 unique problems covering NeetCode 150, Grind 169, Grind 75, and Blind 75. Every problem has intuition, optimal solution, and interview traps.
site_url: https://YOUR_USERNAME.github.io/interview-handbook/
repo_url: https://github.com/YOUR_USERNAME/interview-handbook
repo_name: interview-handbook
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  palette:
    scheme: slate
    primary: black
    accent: deep purple
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/YOUR_USERNAME

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - pymdownx.details
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

